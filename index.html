<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>С 8 Марта! 💐</title>
    <!-- Favicon: красное сердечко (SVG) -->
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cpath fill='%23ff4d6d' d='M50 88.5L14.2 52.7c-6.5-6.5-6.5-17 0-23.5s17-6.5 23.5 0L50 41.5l12.3-12.3c6.5-6.5 17-6.5 23.5 0s6.5 17 0 23.5L50 88.5z'/%3E%3C/svg%3E" type="image/svg+xml">
    <style>
        /* ===== RESET & GLOBAL ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #2b1a2e 0%, #1d2b3a 50%, #1f3b3a 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            padding: 1rem;
        }

        /* ===== FLOATING ELEMENTS ===== */
        .floating-elements {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .float-item {
            position: absolute;
            font-size: clamp(1.2rem, 4vw, 2.5rem);
            opacity: 0.25;
            user-select: none;
            animation: floatAround linear infinite;
            filter: drop-shadow(0 8px 12px rgba(255, 200, 240, 0.2));
            will-change: transform;
        }

        @keyframes floatAround {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(15px, -20px) rotate(8deg); }
            50% { transform: translate(-10px, -35px) rotate(-5deg); }
            75% { transform: translate(-25px, -15px) rotate(3deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        /* ===== ОСНОВНЫЕ ЭКРАНЫ ===== */
        .screen {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1), transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-radius: 56px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 30px 50px -20px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255, 255, 255, 0.08);
            padding: 3rem 2rem;
        }

        .screen.hidden {
            opacity: 0;
            transform: scale(0.96) translateY(8px);
            pointer-events: none;
            position: absolute;
        }

        .screen:not(.hidden) {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        /* ===== ТИПОГРАФИЯ ===== */
        h1 {
            font-size: clamp(2.5rem, 8vw, 4.2rem);
            font-weight: 600;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #ffe6f0, #fff0f5, #ffe0f0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 1rem;
            text-shadow: 0 2px 20px rgba(255, 120, 160, 0.4);
        }

        .subhead {
            font-size: clamp(1.2rem, 4vw, 1.5rem);
            font-weight: 350;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 2rem;
            backdrop-filter: blur(5px);
        }

        .instruction {
            font-size: clamp(1.1rem, 3.5vw, 1.3rem);
            font-weight: 400;
            color: #ffd9e8;
            margin: 2.5rem 0 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            word-spacing: 4px;
        }

        /* ===== СЕТКА КНОПОК ===== */
        .button-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
            margin: 2rem 0 1rem;
        }

        .name-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 200, 230, 0.2);
            border-radius: 60px;
            padding: 1.2rem 2.5rem;
            font-size: 1.7rem;
            font-weight: 450;
            color: white;
            backdrop-filter: blur(12px);
            box-shadow: 0 15px 30px -12px rgba(0,0,0,0.5), 0 0 0 1px rgba(255, 220, 240, 0.2) inset;
            cursor: pointer;
            transition: all 0.3s ease;
            flex: 0 1 auto;
            min-width: 200px;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .name-btn:hover {
            transform: scale(1.05) translateY(-4px);
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 200, 230, 0.8);
            box-shadow: 0 25px 35px -10px #ff99cc80, 0 0 25px #ffb6c1;
        }

        .name-btn:active {
            transform: scale(0.98);
        }

        .name-btn::after {
            content: attr(data-emoji);
            font-size: 1.8rem;
            filter: drop-shadow(0 2px 2px gold);
        }

        /* ===== ЭКРАН ПОЗДРАВЛЕНИЯ ===== */
        .message-card {
            text-align: center;
            padding: 2rem 1rem;
        }

        .personal-message {
            font-size: clamp(1.5rem, 5vw, 3rem);
            font-weight: 450;
            line-height: 1.4;
            max-width: 750px;
            margin: 2rem auto;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 70px;
            padding: 2.5rem 2.2rem;
            border: 2px solid rgba(255, 255, 255, 0.25);
            color: #fff5fa;
            white-space: pre-line;
            transition: background 0.5s, border-color 0.5s, box-shadow 0.5s;
            position: relative;
            overflow: hidden;
        }

        /* уникальные темы для каждого получателя (яркие градиенты) */
        [data-theme="mama"] .personal-message {
            background: radial-gradient(circle at 30% 30%, #ff7e9f, #b03a5e);
            border-color: #ffb3c6;
            box-shadow: 0 0 40px #ff80b0;
        }
        [data-theme="mama"] .personal-message::before {
            content: "👩‍👧‍👧";
            position: absolute;
            font-size: 5rem;
            left: 0;
            bottom: 0;
            opacity: 0.15;
            transform: rotate(-10deg);
        }

        [data-theme="babushka"] .personal-message {
            background: linear-gradient(135deg, #b48bc0, #7d669e);
            border-color: #e2bee6;
            box-shadow: 0 0 40px #c28fe0;
        }
        [data-theme="babushka"] .personal-message::before {
            content: "👵🕯️";
            position: absolute;
            font-size: 5rem;
            right: 0;
            top: 0;
            opacity: 0.15;
            transform: rotate(10deg);
        }

        [data-theme="lena"] .personal-message {
            background: radial-gradient(circle at 70% 20%, #ffb38b, #d3604a);
            border-color: #ffb99a;
            box-shadow: 0 0 40px #ff9f70;
        }
        [data-theme="lena"] .personal-message::before {
            content: "🌸🌺";
            position: absolute;
            font-size: 5rem;
            left: 20px;
            top: 0;
            opacity: 0.15;
        }

        [data-theme="olya"] .personal-message {
            background: linear-gradient(145deg, #f7c978, #e6846b);
            border-color: #fdd48d;
            box-shadow: 0 0 40px #fabc60;
        }
        [data-theme="olya"] .personal-message::before {
            content: "🌿🍃";
            position: absolute;
            font-size: 5rem;
            right: 20px;
            bottom: 10px;
            opacity: 0.15;
        }

        [data-theme="katya"] .personal-message {
            background: linear-gradient(45deg, #a1d6b0, #3f8f6b);
            border-color: #a8e6be;
            box-shadow: 0 0 40px #80dfa0;
        }
        [data-theme="katya"] .personal-message::before {
            content: "🌅✨";
            position: absolute;
            font-size: 5rem;
            right: 10px;
            top: 10px;
            opacity: 0.15;
        }

        [data-theme="anya"] .personal-message {
            background: radial-gradient(circle at 20% 80%, #fcb69f, #f05b5b);
            border-color: #ffacac;
            box-shadow: 0 0 40px #ff7e7e;
        }
        [data-theme="anya"] .personal-message::before {
            content: "🐚💖";
            position: absolute;
            font-size: 5rem;
            left: 50%;
            transform: translateX(-50%);
            bottom: 0;
            opacity: 0.1;
        }

        .back-btn {
            background: rgba(255,255,240,0.1);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 50px;
            padding: 0.9rem 2.5rem;
            font-size: 1.3rem;
            font-weight: 400;
            color: #fff0f8;
            backdrop-filter: blur(12px);
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 2rem;
            display: inline-block;
            box-shadow: 0 8px 18px rgba(0,0,0,0.3);
        }

        .back-btn:hover {
            background: rgba(255, 240, 245, 0.25);
            border-color: #ffb6d9;
            transform: scale(1.03);
            box-shadow: 0 0 25px #ffa5c3;
        }

        /* ===== КНОПКА MUTE ===== */
        .mute-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50px;
            width: 55px;
            height: 55px;
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            transition: 0.25s;
            box-shadow: 0 8px 18px rgba(0,0,0,0.4);
        }

        .mute-btn:hover {
            background: rgba(255, 200, 230, 0.3);
            border-color: #ffcfdf;
            transform: scale(1.08);
        }

        /* ===== ВСПЛЫВАЮЩИЕ СЕРДЦА (explosion) ===== */
        .explosion-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 200;
        }

        .explode-heart {
            position: absolute;
            font-size: 2rem;
            animation: explode 1.8s ease-out forwards;
            filter: drop-shadow(0 0 15px hotpink);
        }

        @keyframes explode {
            0% { transform: translate(0, 0) scale(0.8); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(1.5); opacity: 0; }
        }

        /* ===== ПОДПИСЬ АВТОРА ===== */
        .credits {
            position: fixed;
            bottom: 12px;
            right: 20px;
            z-index: 300;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(4px);
            padding: 4px 10px;
            border-radius: 30px;
            background: rgba(0,0,0,0.1);
            letter-spacing: 0.5px;
            font-weight: 300;
            pointer-events: none; /* чтобы не мешать кликам */
            user-select: none;
        }

        @media (max-width: 600px) {
            .credits {
                font-size: 0.75rem;
                bottom: 8px;
                right: 12px;
                padding: 3px 8px;
            }
        }

        /* ===== МОБИЛЬНАЯ ОПТИМИЗАЦИЯ ===== */
        @media (max-width: 768px) {
            .screen {
                backdrop-filter: blur(5px);
                -webkit-backdrop-filter: blur(5px);
            }
            .name-btn {
                padding: 0.8rem 1.2rem;
                font-size: 1.3rem;
                min-width: 140px;
            }
            .personal-message {
                box-shadow: 0 0 20px currentColor;
            }
        }

        @media (max-width: 480px) {
            .name-btn {
                font-size: 1.1rem;
                padding: 0.6rem 0.8rem;
                min-width: 120px;
            }
            .name-btn::after {
                font-size: 1.2rem;
            }
            .personal-message {
                padding: 1.5rem 1rem;
                font-size: 1.3rem;
            }
            .back-btn {
                padding: 0.6rem 1.5rem;
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>

    <!-- ФОН: ПЛАВАЮЩИЕ ЦВЕТЫ И СЕРДЦА -->
    <div class="floating-elements" id="floatingContainer"></div>

    <!-- КНОПКА MUTE -->
    <div class="mute-btn" id="muteToggle">🔊</div>

    <!-- АУДИОЭЛЕМЕНТ С ФОНОВОЙ МУЗЫКОЙ (тихо, 5%) -->
    <audio id="bgMusic" loop preload="auto" style="display: none;">
        <!-- Укажите путь к вашему файлу. Например: -->
        <source src="background.mp3" type="audio/mpeg">
        Ваш браузер не поддерживает аудио.
    </audio>

    <!-- КОНТЕЙНЕР ДЛЯ ВЗРЫВА СЕРДЕЦ -->
    <div class="explosion-container" id="explosionContainer"></div>

    <!-- ПОДПИСЬ АВТОРА -->
    <div class="credits">✎ создатель: Ваик</div>

    <!-- ЭКРАН 1: ПРИВЕТСТВИЕ И ВЫБОР -->
    <div id="screen1" class="screen">
        <div style="text-align: center;">
            <h1>С 8 Марта 💐</h1>
            <div class="subhead">Этот сайт сделан специально для вас</div>
            <div class="instruction">Выберите, кто вы</div>

            <div class="button-grid">
                <div class="name-btn" data-name="Мама" data-emoji="👩‍👧">Мама</div>
                <div class="name-btn" data-name="Бабушка" data-emoji="👵🌷">Тома Татик</div>
                <div class="name-btn" data-name="Тётя Лена" data-emoji="🌸">Ирина Моркур</div>
                <div class="name-btn" data-name="Тётя Оля" data-emoji="🌺">Лусине Арсик</div>
                <div class="name-btn" data-name="Сестра Аня" data-emoji="💖">Мариамик</div>
                <div class="name-btn" data-name="Сестра Катя" data-emoji="💕">Мелине</div>
            </div>
        </div>
    </div>

    <!-- ЭКРАН 2: ПЕРСОНАЛЬНОЕ ПОЗДРАВЛЕНИЕ -->
    <div id="screen2" class="screen hidden" data-theme="">
        <div class="message-card">
            <div id="personalMessage" class="personal-message"></div>
            <div class="back-btn" id="backButton">← Вернуться назад</div>
        </div>
    </div>

    <script>
        (function() {
            const messages = {
                'Мама': `Дорогая Мама джан!\nСпасибо тебе за заботу, любовь и тепло.\nТы — самый дорогой человек в моей жизни! \nС 8 Марта! 💐`,
                'Бабушка': `Дорогая Тома Татик!\nСпасибо за твою доброту, мудрость и любовь.\nТы делаешь нашу жизнь теплее.\nС праздником 8 Марта! 🌷`,
                'Тётя Лена': `Дорогая Ирина Моркур, поздравляю тебя с 8 Марта!\nПусть каждый день приносит радость, улыбки и счастье.`,
                'Тётя Оля': `Дорогая Лусине Арсик, с праздником!\nПусть в твоей жизни всегда будет весна, радость и вдохновение.`,
                'Сестра Аня': `Мариамик джан, с 8 Марта!\nОставайся такой же яркой, доброй и веселой.`,
                'Сестра Катя': `Мелине джан, поздравляю тебя с 8 Марта!\nПусть у тебя всегда будет хорошее настроение и много счастья.`
            };

            const themeMap = {
                'Мама': 'mama',
                'Бабушка': 'babushka',
                'Тётя Лена': 'lena',
                'Тётя Оля': 'olya',
                'Сестра Аня': 'anya',
                'Сестра Катя': 'katya'
            };

            const screen1 = document.getElementById('screen1');
            const screen2 = document.getElementById('screen2');
            const personalMessageDiv = document.getElementById('personalMessage');
            const backBtn = document.getElementById('backButton');
            const nameBtns = document.querySelectorAll('.name-btn');
            const muteToggle = document.getElementById('muteToggle');
            const floatingContainer = document.getElementById('floatingContainer');
            const explosionContainer = document.getElementById('explosionContainer');
            const bgMusic = document.getElementById('bgMusic');

            const VOLUME_NORMAL = 0.05;
            let userMuted = false;

            function setVolume(volume) {
                bgMusic.volume = Math.max(0, Math.min(1, volume));
            }

            function updateMuteIcon() {
                muteToggle.textContent = (bgMusic.paused || userMuted || bgMusic.volume === 0) ? '🔇' : '🔊';
            }

            function attemptPlay() {
                if (bgMusic.paused) {
                    bgMusic.play()
                        .then(() => {
                            setVolume(userMuted ? 0 : VOLUME_NORMAL);
                            updateMuteIcon();
                        })
                        .catch(() => {});
                } else {
                    setVolume(userMuted ? 0 : VOLUME_NORMAL);
                    updateMuteIcon();
                }
            }

            function toggleMute() {
                if (bgMusic.paused) {
                    userMuted = false;
                    attemptPlay();
                } else {
                    userMuted = !userMuted;
                    setVolume(userMuted ? 0 : VOLUME_NORMAL);
                    updateMuteIcon();
                }
            }

            muteToggle.addEventListener('click', (e) => {
                e.stopPropagation();
                toggleMute();
            });

            // Плавающие элементы с адаптивным количеством
            function createFloatingElements() {
                const isMobile = window.innerWidth <= 768;
                const count = isMobile ? 10 : 35;
                const symbols = ['🌸', '🌹', '🌺', '🌷', '💐', '❤️', '💖', '💗', '🌼', '🌸', '🌻', '🪷', '🌞'];

                for (let i = 0; i < count; i++) {
                    const el = document.createElement('div');
                    el.className = 'float-item';
                    el.textContent = symbols[Math.floor(Math.random() * symbols.length)];
                    el.style.left = Math.random() * 100 + '%';
                    el.style.top = Math.random() * 100 + '%';
                    el.style.fontSize = (0.9 + Math.random() * 2.2) + 'rem';
                    const duration = isMobile ? 30 + Math.random() * 40 : 12 + Math.random() * 25;
                    el.style.animationDuration = duration + 's';
                    el.style.animationDelay = Math.random() * 10 + 's';
                    el.style.opacity = isMobile ? 0.1 : 0.12 + Math.random() * 0.2;
                    floatingContainer.appendChild(el);
                }
            }

            // Взрыв сердец с адаптивным количеством
            function explodeHearts() {
                const isMobile = window.innerWidth <= 768;
                const heartCount = isMobile ? 10 : 40;

                for (let i = 0; i < heartCount; i++) {
                    const heart = document.createElement('div');
                    heart.className = 'explode-heart';
                    heart.innerHTML = ['❤️', '💖', '💘', '💝', '💗', '🌸', '🌺'][Math.floor(Math.random() * 7)];
                    const angle = Math.random() * 2 * Math.PI;
                    const distance = 100 + Math.random() * 250;
                    const tx = Math.cos(angle) * distance + 'px';
                    const ty = Math.sin(angle) * distance - 80 + 'px';
                    heart.style.setProperty('--tx', tx);
                    heart.style.setProperty('--ty', ty);
                    heart.style.left = (window.innerWidth / 2 - 30 + (Math.random() * 60 - 30)) + 'px';
                    heart.style.top = (window.innerHeight / 2 - 30 + (Math.random() * 60 - 30)) + 'px';
                    heart.style.fontSize = (1.5 + Math.random() * 2.5) + 'rem';
                    heart.style.animationDuration = (1.2 + Math.random() * 1) + 's';
                    explosionContainer.appendChild(heart);
                    setTimeout(() => heart.remove(), 1900);
                }
            }

            function showScreen1() {
                screen1.classList.remove('hidden');
                screen2.classList.add('hidden');
            }

            function showScreen2(name) {
                personalMessageDiv.textContent = messages[name] || 'Поздравляю с 8 Марта! 💐';
                screen2.setAttribute('data-theme', themeMap[name] || '');
                screen1.classList.add('hidden');
                screen2.classList.remove('hidden');
                explodeHearts();
                attemptPlay();
            }

            nameBtns.forEach(btn => {
                btn.addEventListener('click', () => showScreen2(btn.getAttribute('data-name')));
            });

            backBtn.addEventListener('click', showScreen1);

            window.addEventListener('load', () => {
                userMuted = false;
                setVolume(VOLUME_NORMAL);
                attemptPlay();
                createFloatingElements();
                screen2.setAttribute('data-theme', '');
            });

            document.body.addEventListener('click', function initAudioOnFirstClick() {
                if (bgMusic.paused) attemptPlay();
                document.body.removeEventListener('click', initAudioOnFirstClick);
            }, { once: true });
        })();
    </script>
</body>
</html>
